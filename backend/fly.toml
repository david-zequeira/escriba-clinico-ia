# Fly.io — región París (UE). Docs: https://fly.io/docs
#
# Primer despliegue:
#   fly auth login
#   fly apps create escriba-clinico-api   # o deja que fly launch lo cree
#   fly volumes create vionix_data --region cdg --size 1
#   fly secrets set STT_API_KEY=... LLM_API_KEY=...
#   fly deploy
#
# Swagger público: https://escriba-clinico-api.fly.dev/docs

app = 'escriba-clinico-api'
primary_region = 'cdg'

[build]
  dockerfile = 'Dockerfile'

[env]
  # ENV=dev: el piloto usa login demo (el bypass de auth solo surte efecto en
  # entornos dev-like; en staging/prod el backend exige OIDC real por diseño).
  # Datos SIEMPRE simulados. Al pasar a OIDC real: ENV=staging y bypass=false.
  ENV = 'dev'
  APP_NAME = 'Vionix IA'
  DOCS_ENABLED = 'true'
  API_PORT = '8080'
  STT_PROVIDER = 'gladia'
  # STT en vivo (WebSocket): sin esto, el default es mock y la transcripción
  # en directo saldría simulada.
  STT_REALTIME_PROVIDER = 'gladia'
  LLM_PROVIDER = 'mistral'
  STT_LANGUAGE = 'es'
  GLADIA_MODEL = 'solaria-3'
  JOB_QUEUE = 'asyncio'
  LLM_MODEL = 'mistral-small-latest'
  DELETE_AUDIO_AFTER_TRANSCRIPTION = 'true'
  DATABASE_URL = 'sqlite+aiosqlite:////app/var/vionix.db'
  AUDIO_STORAGE_DIR = '/app/var/audio'
  # Demo: sin login. Cambiar a false cuando haya Keycloak.
  AUTH_DEV_BYPASS = 'true'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source = 'vionix_data'
  destination = '/app/var'
