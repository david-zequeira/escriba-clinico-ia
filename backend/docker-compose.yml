services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vionix
      POSTGRES_PASSWORD: vionix
      POSTGRES_DB: vionix
    ports:
      - "5432:5432"
    volumes:
      - vionix_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vionix"]
      interval: 5s
      timeout: 5s
      retries: 5

  # IdP OIDC para desarrollo (en prod: self-hosted en cloud UE, OVH/Scaleway).
  # Importa el realm 'vionix' con el cliente público 'vionix-app' (PKCE) y un
  # usuario demo (medico/medico). Solo dev: start-dev usa HTTP y una BD efímera.
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import:ro

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://vionix:vionix@db:5432/vionix
      STT_PROVIDER: mock
      LLM_PROVIDER: mock
      JOB_QUEUE: asyncio
      # Auth OIDC. El `iss` del token es la URL con la que el cliente lo pidió;
      # para evitar el desajuste de host (localhost vs keycloak) en dev, lo normal
      # es correr el backend en el host (uvicorn) apuntando a http://localhost:8080.
      # Descomenta si ejecutas todo en compose y fijas KC_HOSTNAME en Keycloak.
      # OIDC_ISSUER: http://keycloak:8080/realms/vionix
      # OIDC_AUDIENCE: vionix-api
      # AUTH_DEV_BYPASS: "false"
    ports:
      - "8000:8000"
    volumes:
      - vionix_audio:/app/var/audio

volumes:
  vionix_pgdata:
  vionix_audio:
