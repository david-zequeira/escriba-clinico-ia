services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vionix
      POSTGRES_PASSWORD: vionix
      POSTGRES_DB: vionix
    ports:
      - "5432:5432"
    volumes:
      - vionix_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vionix"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://vionix:vionix@db:5432/vionix
      STT_PROVIDER: mock
      LLM_PROVIDER: mock
      JOB_QUEUE: asyncio
    ports:
      - "8000:8000"
    volumes:
      - vionix_audio:/app/var/audio

volumes:
  vionix_pgdata:
  vionix_audio:
